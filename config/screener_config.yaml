# Screener Configuration — Sprint 3
# All threshold definitions for the filter engine. Analyst-editable.

filters:
  roe_min:
    column: return_on_equity_pct
    comparison: min
  de_max:
    column: debt_to_equity
    comparison: max
    skip_for_sector: Financials
  fcf_min:
    column: free_cash_flow_cr
    comparison: min
  revenue_cagr_5yr_min:
    column: revenue_cagr_5yr
    comparison: min
  pat_cagr_5yr_min:
    column: pat_cagr_5yr
    comparison: min
  opm_min:
    column: operating_profit_margin_pct
    comparison: min
  pe_max:
    column: pe_ratio
    comparison: max
  pb_max:
    column: pb_ratio
    comparison: max
  dividend_yield_min:
    column: dividend_yield_pct
    comparison: min
  icr_min:
    column: interest_coverage
    comparison: min
    treat_none_as_infinity: true
  market_cap_min:
    column: market_cap_crore
    comparison: min
  net_profit_min:
    column: net_profit
    comparison: min
  eps_cagr_min:
    column: eps_cagr_5yr
    comparison: min
  asset_turnover_min:
    column: asset_turnover
    comparison: min
  sales_min:
    column: sales
    comparison: min